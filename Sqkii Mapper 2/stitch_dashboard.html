<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#258cf4",
                        "accent-purple": "#8b5cf6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#06080d",
                        "surface-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(16, 25, 34, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .map-bg {
            background: radial-gradient(circle at center, #1a1033 0%, #06080d 100%);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 overflow-hidden h-screen flex">
<!-- Vertical Nav Rail -->
<aside class="w-20 border-r border-slate-800 flex flex-col items-center py-6 gap-8 bg-background-dark z-50">
<div class="size-12 bg-primary/20 rounded-xl flex items-center justify-center text-primary border border-primary/30">
<span class="material-symbols-outlined text-3xl">map</span>
</div>
<nav class="flex flex-col gap-6 flex-1">
<button class="size-12 rounded-xl bg-slate-800/50 flex items-center justify-center hover:bg-primary/20 hover:text-primary transition-colors">
<span class="material-symbols-outlined">dashboard</span>
</button>
<button class="size-12 rounded-xl bg-slate-800/50 flex items-center justify-center hover:bg-primary/20 hover:text-primary transition-colors">
<span class="material-symbols-outlined">layers</span>
</button>
<button class="size-12 rounded-xl bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">database</span>
</button>
<button class="size-12 rounded-xl bg-slate-800/50 flex items-center justify-center hover:bg-primary/20 hover:text-primary transition-colors">
<span class="material-symbols-outlined">analytics</span>
</button>
</nav>
<div class="flex flex-col gap-6">
<button class="size-12 rounded-xl bg-slate-800/50 flex items-center justify-center hover:bg-primary/20 hover:text-primary transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
<div class="size-12 rounded-full overflow-hidden border-2 border-slate-700">
<img alt="User" class="w-full h-full object-cover" data-alt="User profile avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAuUBn_uaGQ_ulmx1HFGtNecTVemGbuaV2bSC-XkxchTMvcrC487gvuINCQ-WO1P5dZOyhZ-UhP43t_fxHAEUg-Gn-MFnDnHYB3SppGTtQi_TXS_5rI73XoD_yUawuQKroU3-c-BU5ScIXpimOXWBQjsoeo2xaNHU9ahqnwO9RGX6UmzsXlJx9A0nELrcum2rIR9QEUF-Y8sgfyIt-PiFT0XjqivAWhDKJHEEzj1EQezSKj7UmOs05LttXEdayRKj9P9PP8h_iNOVI"/>
</div>
</div>
</aside>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col relative">
<!-- Full Bleed Map Background -->
<div class="absolute inset-0 z-0 map-bg" data-location="Singapore Metropolitan Area" style="">
<!-- Simulated Map Grid / Pattern -->
<div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#8b5cf6 0.5px, transparent 0.5px); background-size: 30px 30px;"></div>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark via-transparent to-background-dark/80"></div>
</div>
<!-- Top Navigation Bar -->
<header class="relative z-20 flex items-center justify-between px-8 py-4 glass-panel border-t-0 border-x-0 mx-4 mt-4 rounded-xl">
<div class="flex items-center gap-6">
<div class="flex flex-col">
<h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                        Sqkii Mapper <span class="text-[10px] bg-accent-purple/20 text-accent-purple px-2 py-0.5 rounded-full border border-accent-purple/30 uppercase tracking-widest">Pro</span>
</h1>
</div>
<div class="h-8 w-px bg-slate-700 mx-2"></div>
<nav class="flex items-center gap-6 text-sm font-medium text-slate-400">
<a class="hover:text-primary transition-colors" href="#">Upload</a>
<a class="hover:text-primary transition-colors" href="#">Geohashes</a>
<a class="hover:text-primary transition-colors" href="#">Pixel Grid</a>
<button class="flex items-center gap-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">volume_up</span>
</button>
</nav>
</div>
<div class="flex items-center gap-4">
<div class="relative group">
<button class="flex items-center gap-2 px-4 py-2 bg-accent-purple text-white text-sm font-bold rounded-lg neon-glow transition-transform hover:scale-105">
<span class="material-symbols-outlined text-sm">palette</span>
                        Sqkii Purple Map
                        <span class="material-symbols-outlined text-sm">expand_more</span>
</button>
</div>
<button class="flex items-center justify-center size-10 bg-surface-dark border border-slate-700 rounded-lg hover:border-slate-500">
<span class="material-symbols-outlined">search</span>
</button>
</div>
</header>
<!-- Left Inspector Panel -->
<div class="absolute left-4 top-24 bottom-4 w-80 z-20 flex flex-col gap-4">
<!-- Data Intake Panel -->
<section class="glass-panel rounded-xl p-5 flex flex-col gap-4">
<div class="flex items-center justify-between">
<h2 class="text-sm font-bold uppercase tracking-widest text-slate-400">Data Intake</h2>
<span class="material-symbols-outlined text-slate-500 text-sm">info</span>
</div>
<div class="flex flex-col gap-2">
<label class="text-xs text-slate-500 font-medium ml-1">SOURCE URL</label>
<div class="flex bg-background-dark/50 border border-slate-700 rounded-lg overflow-hidden focus-within:border-primary transition-colors">
<input class="bg-transparent border-none text-sm w-full focus:ring-0 text-slate-300 px-3 py-2" placeholder="https://data.sqkii.com/v1/..." type="text"/>
</div>
</div>
<div class="grid grid-cols-2 gap-2">
<button class="flex items-center justify-center gap-2 px-3 py-2 bg-surface-dark border border-slate-700 rounded-lg text-xs font-bold hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-sm">upload_file</span>
                        IMPORT KML
                    </button>
<button class="flex items-center justify-center gap-2 px-3 py-2 bg-surface-dark border border-slate-700 rounded-lg text-xs font-bold hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-sm">download</span>
                        EXPORT
                    </button>
</div>
</section>
<!-- Geometry Tools Panel -->
<section class="glass-panel rounded-xl p-5 flex flex-col gap-4">
<h2 class="text-sm font-bold uppercase tracking-widest text-slate-400">Geometry Tools</h2>
<div class="grid grid-cols-4 gap-2">
<button class="aspect-square flex flex-col items-center justify-center bg-primary/20 text-primary border border-primary/40 rounded-lg">
<span class="material-symbols-outlined">radio_button_unchecked</span>
<span class="text-[9px] mt-1 font-bold">CIRCLE</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center bg-surface-dark border border-slate-700 rounded-lg text-slate-400 hover:text-white hover:border-slate-500">
<span class="material-symbols-outlined">timeline</span>
<span class="text-[9px] mt-1 font-bold">LINE</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center bg-surface-dark border border-slate-700 rounded-lg text-slate-400 hover:text-white hover:border-slate-500">
<span class="material-symbols-outlined">polyline</span>
<span class="text-[9px] mt-1 font-bold">POLY</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center bg-surface-dark border border-slate-700 rounded-lg text-slate-400 hover:text-white hover:border-slate-500">
<span class="material-symbols-outlined">location_on</span>
<span class="text-[9px] mt-1 font-bold">POINT</span>
</button>
</div>
<div class="mt-2 p-3 bg-background-dark/30 rounded-lg border border-slate-800">
<div class="flex items-center justify-between text-xs mb-2">
<span class="text-slate-500">RADIUS</span>
<span class="text-primary font-bold">1,250m</span>
</div>
<div class="h-1 bg-slate-800 rounded-full w-full relative">
<div class="absolute left-0 top-0 h-full bg-primary rounded-full w-2/3"></div>
<div class="absolute left-2/3 top-1/2 -translate-y-1/2 size-3 bg-white rounded-full shadow-lg"></div>
</div>
</div>
</section>
</div>
<!-- Center Modal: Join Server -->
<div class="absolute inset-0 z-40 flex items-center justify-center bg-background-dark/40 backdrop-blur-sm">
<div class="glass-panel w-full max-w-md p-10 rounded-2xl flex flex-col items-center gap-8 shadow-2xl relative overflow-hidden">
<!-- Decorative Glow -->
<div class="absolute -top-24 -right-24 size-48 bg-accent-purple/20 blur-3xl rounded-full"></div>
<div class="absolute -bottom-24 -left-24 size-48 bg-primary/20 blur-3xl rounded-full"></div>
<div class="text-center flex flex-col items-center gap-3">
<div class="size-16 bg-accent-purple/10 border border-accent-purple/30 rounded-2xl flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-4xl text-accent-purple">hub</span>
</div>
<h2 class="text-3xl font-bold text-white tracking-tight">Join a server</h2>
<p class="text-slate-400 text-sm max-w-[280px]">Collaborate in real-time by entering a workspace command code.</p>
</div>
<div class="w-full flex flex-col gap-5">
<div class="flex flex-col gap-2">
<label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Server Code</label>
<input class="w-full bg-background-dark/60 border border-slate-700 rounded-xl px-5 py-4 text-center text-xl font-mono tracking-widest text-white focus:border-accent-purple focus:ring-accent-purple/20 transition-all placeholder:text-slate-700" placeholder="SQK-XXXX-XXXX" type="text"/>
</div>
<button class="w-full py-4 bg-accent-purple hover:bg-accent-purple/90 text-white font-bold rounded-xl neon-glow transition-all active:scale-95 flex items-center justify-center gap-2">
                        JOIN WORKSPACE
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="w-full py-2 text-slate-500 hover:text-slate-300 text-sm font-medium transition-colors">
                        Continue without sync
                    </button>
</div>
</div>
</div>
<!-- Zoom Controls (Bottom Right) -->
<div class="absolute bottom-8 right-8 z-20 flex flex-col gap-2">
<button class="size-10 glass-panel rounded-lg flex items-center justify-center hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
<button class="size-10 glass-panel rounded-lg flex items-center justify-center hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
<div class="h-2"></div>
<button class="size-10 glass-panel rounded-lg flex items-center justify-center hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">near_me</span>
</button>
</div>
</main>
</body></html>
